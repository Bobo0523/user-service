name: Spring Boot CI/CD

# ==========================
# 触发条件
# ==========================
on:
  push:
    branches:
      - main

jobs:

  # ==========================
  # Job1：Build
  # ==========================
  build:

    runs-on: ubuntu-latest

    steps:

      # 下载GitHub仓库代码
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # 安装Java 17
      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # Maven缓存，加快编译速度
      - name: Cache Maven Packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: maven-${{ hashFiles('**/pom.xml') }}

      # 编译并运行JUnit测试
      - name: Build Project
        run: mvn clean package

  # ==========================
  # Job2：Docker
  # ==========================
  docker:

    needs: build

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Source Code
        uses: actions/checkout@v4

      # 登录Docker Hub
      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 构建Docker镜像
      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/springboot-app:latest .

      # 推送镜像
      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/springboot-app:latest

  # ==========================
  # Job3：Deploy
  # ==========================
  deploy:

    needs: docker

    runs-on: ubuntu-latest

    steps:

      # SSH登录EC2并执行部署脚本
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_PEM_KEY }}
          timeout: 120s
          command_timeout: 20m
          script: |

            echo "Stopping old container..."

            docker stop springboot || true
            docker rm springboot || true

            echo "Pull latest image..."

            docker compose pull ${{ secrets.DOCKER_USERNAME }}/springboot-app:latest

            echo "Run new container..."

            docker compose up -d 

            echo "Deploy Success!"
